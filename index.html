<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beach Garden — Sprechen Deutsch</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --sea: #1a6b8a;
  --sea-dark: #0e4a63;
  --sea-light: #2d9fc5;
  --turquoise: #00b4c4;
  --sand: #f5e6c8;
  --sand-light: #fdf6e8;
  --sand-dark: #d4b896;
  --text: #1a2e38;
  --text-light: #5a7a88;
  --green: #3aaa6b;
  --coral: #e8604a;
  --gold: #d4a017;
  --shadow: 0 4px 20px rgba(26,107,138,0.12);
  --shadow-lg: 0 8px 40px rgba(26,107,138,0.18);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--sand-light);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ══ HEADER ══ */
.hdr {
  background: linear-gradient(135deg, var(--sea-dark) 0%, var(--sea) 55%, var(--sea-light) 100%);
  padding: 13px 16px 14px;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 18px rgba(0,0,0,0.22);
}
.hdr-top {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 11px; min-height: 46px;
}
.logo { height: 40px; filter: brightness(0) invert(1); flex-shrink: 0; }
.logo-fb { display:none; font-family:'Playfair Display',serif; color:white; font-size:0.85rem; font-style:italic; flex-shrink:0; }
.hdr-info { flex: 1; }
.hdr-info h1 { font-family:'Playfair Display',serif; font-size:1rem; color:white; line-height:1.2; }
.hdr-info p { font-size:0.67rem; color:rgba(255,255,255,0.68); margin-top:1px; }
.stars { color: var(--gold); font-size:0.68rem; letter-spacing:1px; }
.hdr-cat {
  display:none; font-size:0.9rem; font-weight:600;
  color:white; flex:1; text-align:center;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.hdr-cat.on { display:block; }
.back-btn {
  display:none; align-items:center; gap:4px;
  background:rgba(255,255,255,0.18); border:none;
  border-radius:20px; padding:6px 12px 6px 8px;
  color:white; font-size:0.79rem;
  font-family:'DM Sans',sans-serif; font-weight:500;
  cursor:pointer; flex-shrink:0;
}
.back-btn.on { display:flex; }

/* Barre recherche */
.srch { position:relative; }
.srch input {
  width:100%; padding:8px 34px 8px 32px;
  border-radius:20px; border:none;
  background:rgba(255,255,255,0.16);
  color:white; font-size:0.83rem;
  font-family:'DM Sans',sans-serif; outline:none;
}
.srch input::placeholder { color:rgba(255,255,255,0.52); }
.srch-ico { position:absolute; left:10px; top:50%; transform:translateY(-50%); font-size:0.9rem; pointer-events:none; }
.srch-x { position:absolute; right:10px; top:50%; transform:translateY(-50%); background:none; border:none; color:rgba(255,255,255,0.6); font-size:0.95rem; cursor:pointer; display:none; }
.srch-x.on { display:block; }

/* ══ TABS ══ */
.tabs { background:white; border-bottom:2px solid var(--sand); display:flex; }
.tab {
  flex:1; padding:10px 3px; border:none; background:none;
  font-family:'DM Sans',sans-serif; font-size:0.72rem; font-weight:500;
  color:var(--text-light); cursor:pointer; white-space:nowrap;
  border-bottom:3px solid transparent; margin-bottom:-2px;
  display:flex; align-items:center; justify-content:center; gap:4px;
  transition:color .18s, border-color .18s;
}
.tab.on { color:var(--sea); border-bottom-color:var(--sea); font-weight:600; }

/* Stats */
.stats {
  background:white; padding:7px 16px;
  display:flex; gap:14px; border-bottom:1px solid var(--sand);
  font-size:0.73rem; color:var(--text-light);
}
.stat b { color:var(--sea); }
.audio-test {
  margin-left:auto; border:none; cursor:pointer;
  background:linear-gradient(135deg,var(--sea),var(--sea-light));
  color:white; border-radius:20px; padding:5px 12px;
  font-family:'DM Sans',sans-serif; font-size:0.72rem; font-weight:600;
  -webkit-tap-highlight-color:transparent;
}
.audio-test:active { transform:scale(0.95); }

/* ══ VIEWS ══ */
.view { display:none; }
.view.on { display:block; }
.main { padding:13px 13px 88px; }

/* ══ GRILLE CATÉGORIES ══ */
.cat-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.cat-card {
  background:white; border-radius:16px;
  padding:17px 13px 15px;
  box-shadow:var(--shadow); cursor:pointer;
  transition:transform .14s, box-shadow .14s;
  display:flex; flex-direction:column;
  align-items:flex-start; gap:6px;
  border-bottom:3px solid var(--sea);
  position:relative; overflow:hidden;
  -webkit-tap-highlight-color: transparent;
}
.cat-card:active { transform:scale(0.96); box-shadow:var(--shadow-lg); }
.cat-card::after { content:'›'; position:absolute; right:11px; bottom:13px; color:var(--sea); font-size:1.05rem; opacity:0.5; }
.cc-em { font-size:1.8rem; line-height:1; }
.cc-nm { font-size:0.79rem; font-weight:600; color:var(--text); line-height:1.3; }
.cc-ct { font-size:0.69rem; color:var(--text-light); background:var(--sand); border-radius:20px; padding:2px 8px; }

/* ══ CARTE PHRASE — mode oral ══ */
.phrase-card {
  background:white; border-radius:14px;
  margin-bottom:10px; box-shadow:var(--shadow);
  overflow:hidden; border-left:4px solid var(--sea);
}
.phrase-card.fav { border-left-color:var(--gold); }

.card-fr {
  padding:13px 14px 4px;
  font-size:0.8rem; color:var(--text-light);
  display:flex; align-items:center; gap:7px;
}
.card-fr .ce { font-size:1.2rem; flex-shrink:0; }

/* LE VRAI ALLEMAND (sous le français) */
.card-de {
  padding:2px 14px 0; font-size:0.97rem; font-weight:600;
  color:var(--sea); line-height:1.4;
  display:flex; align-items:baseline; gap:6px;
}
.card-de::before { content:'🇩🇪'; font-size:0.82rem; flex-shrink:0; }

/* LA PHONÉTIQUE EST LE HÉROS (prononciation) */
.card-ph {
  padding:3px 14px 12px 14px;
  font-size:1.13rem; font-weight:700;
  color:var(--sea-dark);
  line-height:1.4; letter-spacing:0.2px;
}

.card-btns {
  padding:0 12px 11px;
  display:flex; gap:7px; justify-content:flex-end;
  align-items:center;
}
.btn-listen {
  background:linear-gradient(135deg, var(--sea), var(--sea-light));
  color:white; border:none; border-radius:22px;
  padding:8px 18px; font-size:0.82rem;
  font-family:'DM Sans',sans-serif; font-weight:600;
  cursor:pointer; display:flex; align-items:center; gap:6px;
  box-shadow:0 2px 10px rgba(26,107,138,0.28);
  transition:transform .12s;
  letter-spacing:0.2px;
}
.btn-listen:active { transform:scale(0.95); }
.btn-listen.playing { background:linear-gradient(135deg,var(--turquoise),var(--green)); }
.btn-fav {
  background:none; border:1.5px solid var(--sand-dark);
  border-radius:20px; padding:5px 11px;
  font-size:0.77rem; cursor:pointer;
  font-family:'DM Sans',sans-serif; color:var(--text-light);
  transition:all .18s;
}
.btn-fav.on { background:var(--gold); border-color:var(--gold); color:white; }
.btn-slow {
  background:var(--sand); color:var(--sea-dark);
  border:1.5px solid var(--sand-dark); border-radius:22px;
  padding:8px 13px; font-size:0.8rem;
  font-family:'DM Sans',sans-serif; font-weight:600;
  cursor:pointer; display:flex; align-items:center; gap:4px;
  transition:transform .12s; -webkit-tap-highlight-color:transparent;
}
.btn-slow:active { transform:scale(0.95); }
.btn-slow.playing { background:var(--turquoise); color:white; border-color:var(--turquoise); }

/* ══ QUIZ ORAL ══ */
.qz-inner { padding:13px 13px 88px; }
.qcard { background:white; border-radius:18px; padding:20px 16px; box-shadow:var(--shadow-lg); margin-bottom:11px; }
.qprog { background:var(--sand); border-radius:8px; height:5px; margin-bottom:13px; overflow:hidden; }
.qprog-bar { height:100%; background:linear-gradient(90deg,var(--sea),var(--turquoise)); border-radius:8px; transition:width .4s; }
.qlbl { font-size:0.7rem; text-transform:uppercase; letter-spacing:1.3px; color:var(--text-light); margin-bottom:12px; }

/* Zone audio centrale dans le quiz */
.q-audio-zone {
  background:linear-gradient(135deg, var(--sea-dark), var(--sea));
  border-radius:14px; padding:22px 16px;
  text-align:center; margin-bottom:18px;
}
.q-audio-label { font-size:0.75rem; color:rgba(255,255,255,0.65); margin-bottom:12px; letter-spacing:0.5px; }
.q-listen-btn {
  background:rgba(255,255,255,0.18); border:2px solid rgba(255,255,255,0.4);
  color:white; border-radius:50px; padding:12px 28px;
  font-size:1rem; font-family:'DM Sans',sans-serif; font-weight:700;
  cursor:pointer; transition:all .18s; letter-spacing:0.3px;
  backdrop-filter:blur(4px);
}
.q-listen-btn:active { transform:scale(0.95); }
.q-listen-btn.playing { background:rgba(255,255,255,0.28); border-color:white; }
.q-emoji { font-size:1.8rem; display:block; margin-bottom:8px; }
.q-instr { font-size:0.78rem; color:rgba(255,255,255,0.7); margin-top:10px; }
.q-slow-btn {
  margin-top:11px; background:rgba(255,255,255,0.12);
  border:1.5px solid rgba(255,255,255,0.3); color:rgba(255,255,255,0.92);
  border-radius:50px; padding:7px 18px; font-size:0.8rem;
  font-family:'DM Sans',sans-serif; font-weight:600; cursor:pointer;
  display:inline-block; -webkit-tap-highlight-color:transparent;
}
.q-slow-btn:active { transform:scale(0.95); }
.q-slow-btn.playing { background:rgba(255,255,255,0.25); border-color:white; color:white; }

.qopts { display:grid; gap:9px; }
.qopt {
  padding:13px 15px; border-radius:12px;
  border:2px solid var(--sand-dark); background:var(--sand-light);
  font-family:'DM Sans',sans-serif; font-size:0.88rem;
  cursor:pointer; text-align:left; transition:all .18s; line-height:1.35;
}
.qopt:hover { border-color:var(--sea); background:rgba(26,107,138,0.04); }
.qopt.correct { border-color:var(--green); background:rgba(58,170,107,0.09); color:var(--green); font-weight:600; }
.qopt.wrong { border-color:var(--coral); background:rgba(232,96,74,0.09); color:var(--coral); }
.qfb { margin-top:11px; padding:10px 13px; border-radius:11px; font-size:0.86rem; font-weight:500; display:none; }
.qfb.on { display:block; }
.qfb.c { background:rgba(58,170,107,0.1); color:var(--green); }
.qfb.w { background:rgba(232,96,74,0.1); color:var(--coral); }
.qnext { width:100%; margin-top:10px; background:linear-gradient(135deg,var(--sea),var(--sea-light)); color:white; border:none; border-radius:13px; padding:13px; font-size:0.9rem; font-weight:600; font-family:'DM Sans',sans-serif; cursor:pointer; display:none; box-shadow:var(--shadow); }
.qnext.on { display:block; }
.qresult { background:linear-gradient(135deg,var(--sea-dark),var(--sea)); color:white; border-radius:20px; padding:28px 20px; text-align:center; box-shadow:var(--shadow-lg); }
.qresult h2 { font-family:'Playfair Display',serif; font-size:1.9rem; margin-bottom:6px; }
.qresult p { color:rgba(255,255,255,0.76); margin-bottom:16px; font-size:0.9rem; line-height:1.5; }
.qrestart { background:var(--gold); color:white; border:none; border-radius:12px; padding:11px 24px; font-size:0.9rem; font-weight:600; font-family:'DM Sans',sans-serif; cursor:pointer; }

/* ══ FAVORIS ══ */
.empty { text-align:center; padding:55px 20px; color:var(--text-light); }
.empty .big { font-size:2.8rem; display:block; margin-bottom:11px; }
.empty p { font-size:0.86rem; line-height:1.6; }

/* Recherche */
.sr-info { font-size:0.75rem; color:var(--text-light); padding:7px 4px 5px; }
.nores { text-align:center; padding:48px 20px; color:var(--text-light); }
.nores .big { font-size:2.5rem; display:block; margin-bottom:9px; }
mark { background:rgba(0,180,196,0.2); color:var(--sea-dark); border-radius:3px; padding:0 2px; }

/* ══ MODE ACCUEIL / DIALOGUE ══ */
/* Liste des parcours */
.flow-card {
  background:white; border-radius:16px;
  padding:18px 16px; margin-bottom:11px;
  box-shadow:var(--shadow); cursor:pointer;
  display:flex; align-items:center; gap:14px;
  border-left:4px solid var(--sea);
  transition:transform .14s, box-shadow .14s;
  -webkit-tap-highlight-color:transparent;
}
.flow-card:active { transform:scale(0.98); box-shadow:var(--shadow-lg); }
.flow-em { font-size:2rem; flex-shrink:0; }
.flow-txt { flex:1; min-width:0; }
.flow-nm { font-size:0.95rem; font-weight:600; color:var(--text); line-height:1.3; margin-bottom:3px; }
.flow-desc { font-size:0.76rem; color:var(--text-light); line-height:1.4; }
.flow-arrow { color:var(--sea); font-size:1.2rem; opacity:0.55; flex-shrink:0; }
.flow-intro { font-size:0.8rem; color:var(--text-light); line-height:1.5; padding:2px 4px 14px; }

/* Barre de progression d'étapes */
.step-head {
  display:flex; align-items:center; gap:8px;
  margin-bottom:6px; flex-wrap:wrap;
}
.step-counter { font-size:0.74rem; color:var(--text-light); font-weight:600; }
.step-dots { display:flex; gap:4px; flex:1; flex-wrap:wrap; }
.step-dot { width:7px; height:7px; border-radius:50%; background:var(--sand-dark); transition:background .2s; }
.step-dot.done { background:var(--sea-light); }
.step-dot.cur { background:var(--sea); transform:scale(1.3); }

/* Bloc "ce que TU dis" */
.say-block {
  background:white; border-radius:16px;
  box-shadow:var(--shadow); overflow:hidden;
  border-left:4px solid var(--sea);
  margin-bottom:11px;
}
.say-label {
  background:linear-gradient(135deg, var(--sea-dark), var(--sea));
  color:white; padding:8px 14px;
  font-size:0.74rem; font-weight:600;
  letter-spacing:0.4px; display:flex; align-items:center; gap:6px;
}
.say-fr { padding:12px 14px 2px; font-size:0.84rem; color:var(--text-light); line-height:1.45; }
.say-de { padding:2px 14px 0; font-size:0.95rem; font-weight:600; color:var(--sea); line-height:1.45; display:flex; align-items:baseline; gap:6px; }
.say-de::before { content:'🇩🇪'; font-size:0.8rem; flex-shrink:0; }
.say-ph { padding:3px 14px 12px; font-size:1.12rem; font-weight:700; color:var(--sea-dark); line-height:1.45; }
.say-btns { padding:0 12px 12px; display:flex; gap:7px; justify-content:flex-end; }

/* Bloc "ce que le CLIENT peut répondre" */
.hear-block {
  background:#fef9f0; border-radius:16px;
  border:1.5px dashed var(--sand-dark);
  padding:12px 14px; margin-bottom:11px;
}
.hear-label { font-size:0.73rem; font-weight:600; color:var(--gold); letter-spacing:0.4px; margin-bottom:8px; display:flex; align-items:center; gap:6px; }
.hear-item { display:flex; align-items:baseline; gap:8px; padding:5px 0; border-bottom:1px solid rgba(212,184,150,0.3); }
.hear-item:last-child { border-bottom:none; }
.hear-de { font-size:0.86rem; font-weight:600; color:var(--text); }
.hear-fr { font-size:0.77rem; color:var(--text-light); }

/* Bloc info / mémo (pas de phrase, juste un rappel pour toi) */
.memo-block {
  background:rgba(0,180,196,0.07);
  border-radius:14px; border-left:4px solid var(--turquoise);
  padding:11px 14px; margin-bottom:11px;
  font-size:0.82rem; color:var(--text); line-height:1.5;
}
.memo-block b { color:var(--sea-dark); }
.memo-label { font-size:0.72rem; font-weight:700; color:var(--turquoise); letter-spacing:0.4px; margin-bottom:5px; }

/* Navigation entre étapes */
.step-nav { display:flex; gap:10px; margin-top:6px; }
.step-prev, .step-next {
  flex:1; border:none; border-radius:13px;
  padding:13px; font-size:0.9rem; font-weight:600;
  font-family:'DM Sans',sans-serif; cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.step-prev { background:var(--sand); color:var(--text-light); }
.step-prev:disabled { opacity:0.4; }
.step-next { background:linear-gradient(135deg,var(--sea),var(--sea-light)); color:white; box-shadow:var(--shadow); }
.step-next:active, .step-prev:active { transform:scale(0.97); }
.step-title { font-family:'Playfair Display',serif; font-size:1.05rem; color:var(--text); margin:8px 0 12px; line-height:1.3; }

/* ══ BOTTOM NAV ══ */
.bnav {
  position:fixed; bottom:0; left:0; right:0;
  background:white; border-top:1px solid var(--sand);
  display:flex; box-shadow:0 -3px 16px rgba(0,0,0,0.07); z-index:50;
}
.bnav-btn {
  flex:1; border:none; background:none; padding:8px 6px 6px;
  font-family:'DM Sans',sans-serif; font-size:0.66rem; font-weight:500;
  color:var(--text-light); cursor:pointer;
  display:flex; flex-direction:column; align-items:center; gap:2px;
  transition:color .18s; -webkit-tap-highlight-color:transparent;
}
.bnav-btn .ni { font-size:1.2rem; }
.bnav-btn.on { color:var(--sea); }

/* ══════════════════════════════════════
   OPTIMISATION GRAND ÉCRAN / PC (poste de réception)
   Mobile-first conservé ; on enrichit à partir de 760px.
══════════════════════════════════════ */
@media (min-width:760px){
  html{ font-size:17.5px; }                 /* tout grossit (rem) → lisible à 1-2 m */
  .hdr{ padding:16px 24px 17px; }
  .hdr-top{ max-width:1080px; margin:0 auto 12px; min-height:54px; }
  .logo{ height:48px; }
  .hdr-info h1{ font-size:1.25rem; }
  .hdr-info p{ font-size:0.78rem; }
  .srch{ max-width:1080px; margin:0 auto; }
  .srch input{ padding:11px 38px 11px 40px; font-size:0.95rem; }
  .tabs{ max-width:1080px; margin:0 auto; border-bottom:none; gap:4px; padding:6px 24px 0; }
  .tab{ font-size:0.95rem; padding:13px 10px; border-radius:12px 12px 0 0; }
  .stats{ max-width:1080px; margin:0 auto; padding:9px 24px; font-size:0.82rem; }

  /* Conteneur de contenu centré */
  .main, .qz-inner{ max-width:1080px; margin:0 auto; padding:22px 24px 40px; }

  /* Grille catégories multi-colonnes auto */
  .cat-grid{ grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:16px; }
  .cat-card{ padding:22px 18px 18px; }
  .cc-em{ font-size:2.2rem; }
  .cc-nm{ font-size:0.92rem; }

  /* Phrases & parcours : 2 colonnes sur large écran */
  #phList, #srList, #fvContent{ display:grid; grid-template-columns:repeat(auto-fill,minmax(360px,1fr)); gap:14px; align-items:start; }
  .phrase-card{ margin-bottom:0; }
  .card-ph{ font-size:1.3rem; }
  .card-fr{ font-size:0.9rem; }

  /* Parcours dialogue : colonne lisible centrée */
  #stepWrap{ max-width:760px; margin:0 auto; }
  #flowGrid{ max-width:760px; margin:0 auto; }
  .say-ph{ font-size:1.28rem; }
  .qcard{ max-width:680px; margin:0 auto 11px; padding:26px 22px; }

  /* La barre du bas devient inutile sur PC (les onglets du haut suffisent) */
  .bnav{ display:none; }
  .main{ padding-bottom:40px; }
  .qz-inner{ padding-bottom:40px; }

  /* Boutons un peu plus grands au survol souris */
  .btn-listen, .btn-slow, .btn-fav{ font-size:0.9rem; }
  .btn-listen{ padding:9px 20px; }
}
@media (min-width:760px){
  .qz-inner{ padding-top:22px; }
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-top">
    <button class="back-btn" id="backBtn" onclick="goBack()">← Retour</button>
    <img class="logo" id="logoImg"
      src="https://static.secureholiday.net/static/CMS/photos/000/062/000062239.png?w=600&format=webp"
      alt="Les Méditerranées"
      onerror="this.style.display='none';document.getElementById('logoFb').style.display='inline'">
    <span class="logo-fb" id="logoFb">Les Méditerranées</span>
    <div class="hdr-info" id="hInfo">
      <div class="stars">★★★★★</div>
      <h1>Beach Garden</h1>
      <p>Guide Deutsch · allemand + prononciation 🎧</p>
    </div>
    <div class="hdr-cat" id="hCat"></div>
  </div>
  <div class="srch">
    <span class="srch-ico">🔍</span>
    <input type="text" id="srchInput" placeholder="Rechercher une phrase…" oninput="onSearch(this.value)">
    <button class="srch-x" id="srchX" onclick="clearSearch()">✕</button>
  </div>
</div>

<!-- TABS -->

/* ══ AUDIO (ultra-robuste, multi-plateforme) ══ */
let deVoice=null;
let voicesReady=false;
let audioUnlocked=false;

function loadVoices(){
  if(!window.speechSynthesis) return;
  const voices=window.speechSynthesis.getVoices();
  if(voices.length>0) voicesReady=true;
  // Priorité : de-DE exact, puis n'importe quel allemand, sinon null (le navigateur prendra sa voix par défaut pour lang=de-DE)
  deVoice = voices.find(v=>v.lang==='de-DE')
         || voices.find(v=>v.lang && v.lang.toLowerCase().replace('_','-').startsWith('de'))
         || null;
}
if(window.speechSynthesis){
  loadVoices();
  window.speechSynthesis.onvoiceschanged = loadVoices;
  // Certains navigateurs ont besoin d'un coup de pouce
  setTimeout(loadVoices, 300);
  setTimeout(loadVoices, 1000);
}

/* Débloque l'audio iOS/Safari : une utterance vide au 1er tap utilisateur */
function unlockAudio(){
  if(audioUnlocked || !window.speechSynthesis) return;
  try{
    const silent=new SpeechSynthesisUtterance('');
    silent.volume=0;
    window.speechSynthesis.speak(silent);
    audioUnlocked=true;
  }catch(e){}
}

/* État de lecture (MP3 ou synthèse) */
let curAudio=null;            // élément <audio> en cours
let curBtnIdle='🔊 Écouter';  // libellé à restaurer sur le bouton courant

function stopPlayback(){
  if(curAudio){ try{ curAudio.pause(); }catch(e){} curAudio=null; }
  if(window.speechSynthesis){ try{ window.speechSynthesis.cancel(); }catch(e){} }
  if(curBtn){ curBtn.classList.remove('playing'); curBtn.innerHTML=curBtnIdle; curBtn=null; }
}

/* Fonction audio unique pour TOUTE l'app
   → essaie d'abord le MP3 pré-généré (vrai allemand), sinon repli synthèse vocale */
function speakDE(de, btn, labelIdle='🔊 Écouter', labelDone='🔊 Écouter', rate=0.85){
  // Reclic sur le même bouton → stop
  if(curBtn===btn){ stopPlayback(); return; }
  stopPlayback();

  btn.classList.add('playing'); btn.innerHTML='⏹ Stop';
  curBtn=btn; curBtnIdle=labelIdle;

  const src = (window.AUDIO && window.AUDIO[de]) ? window.AUDIO[de] : null;
  if(src){
    const a=new Audio(src);
    a.playbackRate = (rate<0.7) ? 0.6 : 1.0;   // « lent » = ralenti, pitch préservé
    try{ a.preservesPitch=true; a.mozPreservesPitch=true; a.webkitPreservesPitch=true; }catch(e){}
    curAudio=a;
    a.onended =()=>{ if(curBtn===btn){ btn.classList.remove('playing'); btn.innerHTML=labelDone; curBtn=null; } if(curAudio===a)curAudio=null; };
    a.onerror =()=>{ if(curAudio===a)curAudio=null; ttsSpeak(de,btn,labelIdle,labelDone,rate); };
    a.play().catch(()=>{ if(curAudio===a)curAudio=null; ttsSpeak(de,btn,labelIdle,labelDone,rate); });
    return;
  }
  // Pas de MP3 pour cette phrase → repli synthèse vocale du navigateur
  ttsSpeak(de,btn,labelIdle,labelDone,rate);
}

/* Repli : synthèse vocale du navigateur (seulement si le MP3 manque) */
function ttsSpeak(de, btn, labelIdle, labelDone, rate){
  if(!window.speechSynthesis){
    if(curBtn===btn){ btn.classList.remove('playing'); btn.innerHTML=labelIdle; curBtn=null; }
    return;
  }
  if(!voicesReady) loadVoices();
  const u=new SpeechSynthesisUtterance(de);
  u.lang='de-DE'; u.rate=rate; u.pitch=1.0; u.volume=1.0;
  if(deVoice) u.voice=deVoice;
  let started=false;
  u.onstart=()=>{ started=true; };
  u.onend=()=>{ if(curBtn===btn){ btn.classList.remove('playing'); btn.innerHTML=labelDone; curBtn=null; } };
  u.onerror=(ev)=>{
    if(curBtn===btn){ btn.classList.remove('playing'); btn.innerHTML=labelIdle; curBtn=null; }
    if(ev && (ev.error==='interrupted' || ev.error==='canceled')) return;
    console.warn('TTS error:', ev && ev.error);
  };
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(u);
  setTimeout(()=>{ if(!started && curBtn===btn){ try{ window.speechSynthesis.resume(); window.speechSynthesis.speak(u); }catch(e){} } }, 1200);
}

/* Alias pour le phrasebook / favoris */
function speak(de, btn){ speakDE(de, btn, '🔊 Écouter', '🔊 Écouter'); }
function speakSlow(de, btn, idle='🐢 Lent', done='🐢 Lent'){ speakDE(de, btn, idle, done, 0.55); }

/* Résout une phrase à partir d'une clé : "p12" = P[12], "fpassage.2.1" = bloc d'un parcours */
function phraseByKey(key){
  if(!key) return null;
  if(key[0]==='p') return P[+key.slice(1)] || null;
  if(key[0]==='f'){
    const m=key.slice(1).split('.');
    const f=FLOWS.find(x=>x.id===m[0]); if(!f) return null;
    const st=f.steps[+m[1]]; if(!st) return null;
    return st.blocks[+m[2]] || null;
  }
  return null;
}
function speakKey(key, btn){ const p=phraseByKey(key); if(p&&p.de) speak(p.de, btn); }
function speakSlowKey(key, btn){ const p=phraseByKey(key); if(p&&p.de) speakSlow(p.de, btn); }

/* ══ CARTE PHRASE ══ */
function card(p,key,q){
  const f=favs.has(key);
  const hl = s => q ? s.replace(new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<mark>$1</mark>') : s;
  return `<div class="phrase-card${f?' fav':''}">
    <div class="card-fr"><span class="ce">${p.e||'🗣️'}</span>${hl(p.fr)}</div>
    <div class="card-de">${hl(p.de)}</div>
    <div class="card-ph">${p.ph}</div>
    <div class="card-btns">
      <button class="btn-fav${f?' on':''}" data-fk="${key}" onclick="togFav('${key}')">${f?'⭐ Favori':'☆ Ajouter'}</button>
      <button class="btn-slow" onclick="speakSlowKey('${key}',this)">🐢 Lent</button>
      <button class="btn-listen" onclick="speakKey('${key}',this)">🔊 Écouter</button>
    </div>
  </div>`;
}

function openFlow(id){
  curFlow=id; curStep=0;
  document.getElementById('scrFlows').style.display='none';
  document.getElementById('scrSteps').style.display='block';
  const f=FLOWS.find(x=>x.id===id);
  document.getElementById('backBtn').classList.add('on');
  document.getElementById('hInfo').style.display='none';
  document.getElementById('logoImg').style.opacity='0';
  document.getElementById('hCat').textContent=f.name;
  document.getElementById('hCat').classList.add('on');
  renderStep();
}

function renderStep(){
  stopPlayback();
  const f=FLOWS.find(x=>x.id===curFlow);
  if(!f) return;
  const step=f.steps[curStep];
  const total=f.steps.length;

  // Points de progression
  let dots='';
  for(let i=0;i<total;i++){
    dots+=`<div class="step-dot ${i<curStep?'done':i===curStep?'cur':''}"></div>`;
  }

  // Blocs
  const blocksHTML=step.blocks.map((b,bi)=>{
    if(b.t==='say'){
      const key=`f${curFlow}.${curStep}.${bi}`;
      const isFav=favs.has(key);
      return `<div class="say-block">
        <div class="say-label">🗣️ ${b.label}</div>
        <div class="say-fr">${b.fr}</div>
        <div class="say-de">${b.de}</div>
        <div class="say-ph">${b.ph}</div>
        <div class="say-btns">
          <button class="btn-fav${isFav?' on':''}" data-fk="${key}" onclick="togFav('${key}')">${isFav?'⭐ Favori':'☆ Ajouter'}</button>
          <button class="btn-slow" onclick="speakSlowKey('${key}',this)">🐢 Lent</button>
          <button class="btn-listen" onclick="speakKey('${key}',this)">🔊 Écouter</button>
        </div>
      </div>`;
    }
    if(b.t==='hear'){
      return `<div class="hear-block">
        <div class="hear-label">👂 ${b.label} (à comprendre)</div>
        ${b.items.map(it=>`<div class="hear-item"><span class="hear-de">${it.de}</span></div><div class="hear-fr">↳ ${it.fr}</div>`).join('')}
      </div>`;
    }
    if(b.t==='memo'){
      return `<div class="memo-block"><div class="memo-label">${b.label}</div>${b.html}</div>`;
    }
    return '';
  }).join('');

  document.getElementById('stepWrap').innerHTML=`
    <div class="step-head">
      <span class="step-counter">Étape ${curStep+1} / ${total}</span>
      <div class="step-dots">${dots}</div>
    </div>
    <div class="step-title">${step.title}</div>
    ${blocksHTML}
    <div class="step-nav">
      <button class="step-prev" onclick="prevStep()" ${curStep===0?'disabled':''}>← Précédent</button>
      <button class="step-next" onclick="nextStep()">${curStep===total-1?'✓ Terminé':'Suivant →'}</button>
    </div>`;
  window.scrollTo({top:0, behavior:'smooth'});
}

function nextStep(){
  const f=FLOWS.find(x=>x.id===curFlow);
  if(curStep < f.steps.length-1){ curStep++; renderStep(); }
  else { goTab('ac'); } // Terminé → retour liste parcours
}
function prevStep(){
  if(curStep>0){ curStep--; renderStep(); }
}



/* ══ RECHERCHE ══ */
function onSearch(v){
  document.getElementById('srchX').classList.toggle('on', v.length>0);
  if(!v.trim()){
    document.getElementById('scrSrch').style.display='none';
    if(curCat!==null){ document.getElementById('scrPh').style.display='block'; }
    else { document.getElementById('scrCats').style.display='block'; }
    return;
  }
  if(curTab!=='ph') goTab('ph');
  const q=v.toLowerCase();
  const res=P.map((p,i)=>({p,i})).filter(({p})=>
    p.fr.toLowerCase().includes(q)||p.ph.toLowerCase().includes(q)||p.de.toLowerCase().includes(q)
  );
  document.getElementById('scrCats').style.display='none';
  document.getElementById('scrPh').style.display='none';
  document.getElementById('scrSrch').style.display='block';
  document.getElementById('backBtn').classList.remove('on');
  document.getElementById('hInfo').style.display='';
  document.getElementById('logoImg').style.opacity='';
  document.getElementById('hCat').classList.remove('on');
  document.getElementById('srInfo').textContent=res.length
    ?`${res.length} résultat${res.length>1?'s':''} pour « ${v} »`:'';
  document.getElementById('srList').innerHTML=res.length
    ?res.map(({p,i})=>card(p,'p'+i,v)).join('')
    :`<div class="nores"><span class="big">🔍</span><p>Aucun résultat pour <strong>« ${v} »</strong></p></div>`;
}
function clearSearch(){
  document.getElementById('srchInput').value='';
  onSearch('');
}

/* ══ NAVIGATION ONGLETS ══ */
function goTab(t){
  stopPlayback();
  curBtn=null;
  curTab=t;
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));
  document.getElementById('view-'+t).classList.add('on');
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  document.getElementById('tab-'+t).classList.add('on');
  document.querySelectorAll('.bnav-btn').forEach(b=>b.classList.remove('on'));
  document.getElementById('nav-'+t).classList.add('on');
  document.getElementById('backBtn').classList.remove('on');
  document.getElementById('hInfo').style.display='';
  document.getElementById('logoImg').style.opacity='';
  document.getElementById('hCat').classList.remove('on');
  if(t!=='ph'){ document.getElementById('srchInput').value=''; document.getElementById('srchX').classList.remove('on'); }
  if(t==='ac'){
    curFlow=null; curStep=0;
    document.getElementById('scrFlows').style.display='block';
    document.getElementById('scrSteps').style.display='none';
    renderFlows();
  }
  if(t==='ph'){
    curCat=null;
    document.getElementById('scrCats').style.display='block';
    document.getElementById('scrPh').style.display='none';
    document.getElementById('scrSrch').style.display='none';
  }
  if(t==='ba'){
    curCat=null;
    document.getElementById('scrBaseCats').style.display='block';
    document.getElementById('scrBasePh').style.display='none';
    renderBaseCats();
  }
  if(t==='qz'){ if(qList.length===0) initQuiz(); renderQuiz(); }
  if(t==='fv') renderFavs();
}

/* ══ QUIZ ORAL ══
   On entend la phrase → on choisit le bon sens en français */
function isBaseCat(c){ const cc=CATS.find(x=>x.id===c); return !!(cc && cc.grp==='base'); }
function initQuiz(){
  qList=P.filter(p=>!isBaseCat(p.c)).sort(()=>Math.random()-.5).slice(0,10);
  qIdx=0; qScore=0; qDone=false;
}
function renderQuiz(){
  const w=document.getElementById('qzWrap');
  if(qIdx>=qList.length){
    let prevBest=0;
    try{ prevBest=parseInt(localStorage.getItem('bg_best')||'0',10)||0; }catch(e){}
    const best=Math.max(qScore, prevBest);
    try{ localStorage.setItem('bg_best', best); }catch(e){}
    document.getElementById('stScore').textContent=best+'/10';
    const isRecord = qScore>prevBest && qScore>0;
    w.innerHTML=`<div class="qresult">
      <h2>${qScore>=8?'🏆':qScore>=5?'👏':'💪'} ${qScore}/10</h2>
      ${isRecord?'<p style="color:var(--gold);font-weight:600;margin-bottom:8px">🎉 Nouveau record !</p>':''}
      <p>${qScore>=8
        ?'Ausgezeichnet! Tu comprends très bien l\'allemand oral du camping !'
        :qScore>=5
        ?'Gut gemacht! Continue à t\'entraîner, tu progresses !'
        :'Weiter üben! Écoute et répète encore, ça vient !'}</p>
      <button class="qrestart" onclick="initQuiz();renderQuiz()">🔄 Rejouer</button>
    </div>`;
    return;
  }
  const q=qList[qIdx];
  // 3 mauvaises réponses françaises
  const bad=P.filter(p=>p.fr!==q.fr && !isBaseCat(p.c)).sort(()=>Math.random()-.5).slice(0,3);
  const opts=[...bad,q].sort(()=>Math.random()-.5);
  const qi=P.indexOf(q);
  // index réel de la bonne réponse dans le tableau opts
  const correctPos=opts.indexOf(q);
  w.innerHTML=`<div class="qcard">
    <div class="qprog"><div class="qprog-bar" style="width:${(qIdx/10)*100}%"></div></div>
    <div class="qlbl">🎧 Écoute et trouve le sens — ${qIdx+1} / 10</div>
    <div class="q-audio-zone">
      <span class="q-emoji">${q.e}</span>
      <div class="q-audio-label">Appuie pour entendre la phrase</div>
      <button class="q-listen-btn" id="qListenBtn" onclick="qSpeak(${qi},this)">🔊 Écouter la phrase</button>
      <div class="q-instr">Puis choisis la bonne traduction ↓</div>
      <button class="q-slow-btn" id="qSlowBtn" onclick="qSpeakSlow(${qi},this)">🐢 Plus lent</button>
    </div>
    <div class="qopts">${opts.map((o,oi)=>`<button class="qopt" onclick="ansQ(this,${oi},${correctPos})">${o.fr}</button>`).join('')}</div>
    <div class="qfb" id="qfb"></div>
    <button class="qnext" id="qnext" onclick="qIdx++;qDone=false;renderQuiz()">Suivant →</button>
  </div>`;
  // Mémoriser les options pour ansQ
  curQOpts=opts;
}

function qSpeak(idx, btn){
  speakDE(P[idx].de, btn, '🔊 Écouter la phrase', '🔊 Réécouter');
}
function qSpeakSlow(idx, btn){ speakSlow(P[idx].de, btn, '🐢 Plus lent', '🐢 Plus lent'); }

function ansQ(btn, chosenPos, correctPos){
  if(qDone) return; qDone=true;
  const correctFr=curQOpts[correctPos].fr;
  document.querySelectorAll('.qopt').forEach(b=>b.style.pointerEvents='none');
  const fb=document.getElementById('qfb');
  if(chosenPos===correctPos){
    btn.classList.add('correct'); qScore++;
    fb.className='qfb on c'; fb.textContent='✅ Richtig! Bonne réponse !';
  } else {
    btn.classList.add('wrong');
    // colorier la bonne option en vert
    const allOpts=document.querySelectorAll('.qopt');
    if(allOpts[correctPos]) allOpts[correctPos].classList.add('correct');
    fb.className='qfb on w'; fb.textContent='❌ Falsch. C\'était : '+correctFr;
  }
  document.getElementById('qnext').classList.add('on');
}

/* ══ FAVORIS ══ */
function renderFavs(){
  const el=document.getElementById('fvContent');
  if(!favs.size){
    el.innerHTML=`<div class="empty"><span class="big">☆</span><p>Aucun favori pour l'instant.<br>Appuie sur <strong>☆ Ajouter</strong> sur une phrase.</p></div>`;
    return;
  }
  el.innerHTML=[...favs].map(key=>{ const p=phraseByKey(key); return p?card(p,key,''):''; }).join('');
}

/* ══ INIT ══ */
document.getElementById('stFav').textContent=favs.size;
try{ const b=parseInt(localStorage.getItem('bg_best'),10); if(!isNaN(b)) document.getElementById('stScore').textContent=b+'/10'; }catch(e){}
renderCats();
renderFlows();
</script>
